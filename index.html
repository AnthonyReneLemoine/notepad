<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad Firebase</title>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
  }
</script>

<style>
  /* Conservation exacte de vos styles d'origine */
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1e1e2e;--panel:#2a2a3e;--card:#313145;
    --accent:#7c6af7;--accent2:#5a4fd4;
    --text:#e0e0f0;--muted:#8888aa;--border:#44446a;
    --danger:#e05c6a;--success:#50c878;
    --arch:#b07a20;--arch-bg:#3a2e10;
    --r:8px;--font:'Segoe UI',system-ui,sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);
       height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--panel);border-bottom:1px solid var(--border);
         padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  header h1{font-size:1.1rem;font-weight:700;color:var(--accent)}
  #status{margin-left:auto;font-size:0.78rem;color:var(--muted);
          display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #dot.saving{background:#f0b429} #dot.saved{background:var(--success)} #dot.error{background:var(--danger)}

  .app{display:flex;flex:1;overflow:hidden}

  aside{width:245px;min-width:245px;background:var(--panel);
        border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

  .sb-tabs{display:flex;border-bottom:1px solid var(--border)}
  .sb-tab{flex:1;padding:9px 6px;text-align:center;font-size:0.8rem;font-weight:600;
          cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
          transition:color .2s,border-color .2s}
  .sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .sb-tab.arch-tab.active{color:#e8a825;border-bottom-color:#e8a825}
  .tab-count{display:inline-block;background:var(--card);border-radius:10px;
             padding:1px 6px;font-size:0.68rem;margin-left:4px;color:var(--muted)}

  .sb-top{padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px}
  #search{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
          color:var(--text);padding:6px 10px;font-size:0.82rem;outline:none;min-width:0}
  #btnNew{background:var(--accent);color:#fff;border:none;border-radius:var(--r);
          padding:6px 11px;cursor:pointer;font-size:1.1rem;font-weight:700;flex-shrink:0}

  #tagFilter{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px}
  .tf-tag{background:var(--card);border:1px solid var(--border);border-radius:20px;
          padding:2px 9px;font-size:0.71rem;cursor:pointer;color:var(--muted)}
  .tf-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}

  #list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
  .ni{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:9px 12px;cursor:pointer;position:relative}
  .ni.active{border-color:var(--accent);background:#3b3b58}
  .ni-t{font-weight:600;font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ni-d{font-size:0.7rem;color:var(--muted);margin-top:2px}
  .ni-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
  .ni-tag{background:#3a3a60;border-radius:20px;padding:1px 7px;font-size:0.67rem;color:var(--accent)}

  main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:10px}
  .toolbar{display:flex;gap:8px;align-items:center}
  #title{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
         color:var(--text);padding:9px 13px;font-size:0.95rem;font-weight:600;outline:none}
  #body{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
        color:var(--text);padding:14px;font-size:0.92rem;line-height:1.65;resize:none;outline:none;font-family:var(--font)}

  #overlay{position:fixed;inset:0;background:rgba(30,30,46,.82);
           display:flex;align-items:center;justify-content:center;z-index:200;gap:10px;color:var(--muted)}
  #overlay.hide{display:none}
  .spin{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  #toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);
         border-radius:var(--r);padding:9px 16px;font-size:0.82rem;opacity:0;transition:all .3s;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<header>
  <h1>Notepad 360°</h1>
  <div id="status">
    <div id="dot"></div>
    <span id="stTxt">Prêt</span>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sb-tabs">
      <div id="tabNotes" class="sb-tab active" onclick="switchTab('notes')">Notes <span class="tab-count" id="countNotes">0</span></div>
      <div id="tabArch" class="sb-tab arch-tab" onclick="switchTab('archived')">Archives <span class="tab-count" id="countArch">0</span></div>
    </div>
    <div class="sb-top">
      <input type="text" id="search" placeholder="Rechercher..." oninput="renderList()">
      <button id="btnNew" onclick="createNewNote()">+</button>
    </div>
    <div id="tagFilter"></div>
    <div id="list"></div>
  </aside>

  <main id="editor" class="hide">
    <div class="toolbar">
      <input type="text" id="title" placeholder="Titre de la note">
      <button class="btn" id="btnSave" onclick="saveCurrentNote()">Enregistrer</button>
      <button class="btn" id="btnClose" onclick="hideEditor()">Fermer</button>
    </div>
    <div class="tag-zone">
      <div id="currentTags" style="display:contents"></div>
      <input type="text" id="tagInput" placeholder="Ajouter un tag...">
    </div>
    <textarea id="body" placeholder="Contenu de la note..."></textarea>
  </main>
</div>

<div id="overlay" class="hide"><div class="spin"></div> Chargement...</div>
<div id="toast"></div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, onValue, set, update, remove, push } from "firebase/database";

  // TODO : Remplacez par vos informations Firebase
  const firebaseConfig = {
  apiKey: "AIzaSyBkDCy6sVzVAspfzwwiY7uHogPFy5wezQs",
  authDomain: "notes-2e0b8.firebaseapp.com",
  databaseURL: "https://notes-2e0b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "notes-2e0b8",
  storageBucket: "notes-2e0b8.firebasestorage.app",
  messagingSenderId: "922708939920",
  appId: "1:922708939920:web:932594a09e80161c3e7415"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let notes = [];
  let currentId = null;
  let currentTab = "notes";

  // --- Initialisation ---
  function init() {
    const notesRef = ref(db, 'notes');
    onValue(notesRef, (snapshot) => {
      const data = snapshot.val();
      notes = data ? Object.values(data) : [];
      renderList();
      updateCounts();
    });
  }

  window.switchTab = (tab) => {
    currentTab = tab;
    document.getElementById("tabNotes").className = "sb-tab" + (tab === "notes" ? " active" : "");
    document.getElementById("tabArch").className = "sb-tab arch-tab" + (tab === "archived" ? " active" : "");
    renderList();
  };

window.renderList = () => {
  const $list = document.getElementById("list");
  $list.innerHTML = "";
  const search = document.getElementById("search").value.toLowerCase();
  
  const filtered = notes.filter(n => {
    const isArch = !!n.archived;
    const matchTab = (currentTab === "archived") ? isArch : !isArch;
    const matchSearch = (n.title + n.body + n.tags).toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  filtered.forEach(n => {
    // On transforme la chaîne "Tag1, Tag2" en tableau
    const tagArray = n.tags ? n.tags.split(',').map(t => t.trim()).filter(t => t !== "") : [];
    
    const el = document.createElement("div");
    el.className = "ni" + (n.id === currentId ? " active" : "");
    
    // Construction du HTML de la note avec les tags
    let tagsHtml = '<div class="ni-tags">';
    tagArray.forEach(t => {
      tagsHtml += `<span class="ni-tag">${t}</span>`;
    });
    tagsHtml += '</div>';

    el.innerHTML = `
      <div class="ni-t">${n.title || "Sans titre"}</div>
      <div class="ni-d">${n.date}</div>
      ${tagArray.length > 0 ? tagsHtml : ''}
    `;
    
    el.onclick = () => openNote(n.id);
    $list.appendChild(el);
  });
};

  window.openNote = (id) => {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    document.getElementById("title").value = note.title;
    document.getElementById("body").value = note.body;
    document.getElementById("editor").classList.remove("hide");
    renderList();
  };

  window.createNewNote = () => {
    currentId = "note_" + Date.now();
    document.getElementById("title").value = "";
    document.getElementById("body").value = "";
    document.getElementById("editor").classList.remove("hide");
  };

  window.saveCurrentNote = async () => {
    if (!currentId) return;
    const title = document.getElementById("title").value;
    const body = document.getElementById("body").value;
    const date = new Date().toLocaleString('fr-FR');

    setStatus("Sauvegarde...", "saving");
    try {
      await set(ref(db, 'notes/' + currentId), {
        id: currentId,
        title: title,
        body: body,
        date: date,
        archived: false
      });
      setStatus("Enregistré", "saved");
      toast("Note sauvegardée ✓", "ok");
    } catch (e) {
      setStatus("Erreur", "error");
    }
  };

  window.hideEditor = () => {
    document.getElementById("editor").classList.add("hide");
    currentId = null;
    renderList();
  };

  function updateCounts() {
    const n = notes.filter(x => !x.archived).length;
    const a = notes.filter(x => x.archived).length;
    document.getElementById("countNotes").textContent = n;
    document.getElementById("countArch").textContent = a;
  }

  function setStatus(txt, state) {
    document.getElementById("stTxt").textContent = txt;
    document.getElementById("dot").className = state || "";
  }

  function toast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "show " + type;
    setTimeout(() => el.className = "", 3000);
  }

  init();
</script>
</body>
</html>
