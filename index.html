<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad 360° - Firebase</title>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
  }
</script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1e1e2e;--panel:#2a2a3e;--card:#313145;
    --accent:#7c6af7;--accent2:#5a4fd4;
    --text:#e0e0f0;--muted:#8888aa;--border:#44446a;
    --danger:#e05c6a;--success:#50c878;
    --arch:#b07a20;--r:8px;--font:'Segoe UI',system-ui,sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);
       height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{background:var(--panel);border-bottom:1px solid var(--border);
         padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  header h1{font-size:1.1rem;font-weight:700;color:var(--accent)}
  #status{margin-left:auto;font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #dot.saving{background:#f0b429} #dot.saved{background:var(--success)} #dot.error{background:var(--danger)}

  .app{display:flex;flex:1;overflow:hidden}

  /* ── Sidebar ── */
  aside{width:260px;min-width:260px;background:var(--panel);
        border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sb-tabs{display:flex;border-bottom:1px solid var(--border)}
  .sb-tab{flex:1;padding:10px 6px;text-align:center;font-size:0.8rem;font-weight:600;
          cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:0.2s}
  .sb-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .sb-tab.arch-tab.active{color:var(--arch);border-bottom-color:var(--arch)}
  .tab-count{display:inline-block;background:var(--card);border-radius:10px;padding:1px 6px;font-size:0.68rem;margin-left:4px}

  .sb-top{padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px}
  #search{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
          color:var(--text);padding:7px 10px;font-size:0.82rem;outline:none}
  #btnNew{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:0 12px;cursor:pointer;font-size:1.2rem;font-weight:700}

  /* ── Tag Filter (Nouveau) ── */
  #tagFilter{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;max-height:80px;overflow-y:auto;background:rgba(0,0,0,0.1)}
  .tf-tag{background:var(--card);border:1px solid var(--border);border-radius:20px;
          padding:2px 9px;font-size:0.71rem;cursor:pointer;color:var(--muted);transition:0.2s}
  .tf-tag:hover{border-color:var(--accent)}
  .tf-tag.active{background:var(--accent);border-color:var(--accent);color:#fff}

  #list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
  .ni{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer}
  .ni.active{border-color:var(--accent);background:#3b3b58}
  .ni-t{font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ni-d{font-size:0.72rem;color:var(--muted);margin-top:2px}
  .ni-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .ni-tag{background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);border-radius:4px;padding:1px 6px;font-size:0.65rem;color:var(--accent)}

  /* ── Éditeur ── */
  main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px}
  main.hide{display:none}
  .toolbar{display:flex;gap:10px;align-items:center}
  #title{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:10px 14px;font-size:1rem;font-weight:600;outline:none}
  .btn{padding:8px 15px;border-radius:var(--r);border:none;cursor:pointer;font-weight:600;font-size:0.85rem}
  #btnSave{background:var(--accent);color:#fff}
  #btnArch{background:var(--card);color:var(--text);border:1px solid var(--border)}
  #btnDel{background:transparent;color:var(--danger);font-size:0.8rem;cursor:pointer;border:none}
  .tag-zone{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px}
  #tagInput{background:transparent;border:none;color:var(--text);flex:1;padding:6px;outline:none;font-size:0.85rem}
  #body{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:16px;font-size:0.95rem;line-height:1.6;resize:none;outline:none;font-family:inherit}

  #toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 20px;font-size:0.85rem;opacity:0;transition:0.3s;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(-10px)}
  #overlay{position:fixed;inset:0;background:rgba(30,30,46,0.8);display:flex;align-items:center;justify-content:center;z-index:100}
  .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>Notepad 360°</h1>
  <div id="status">
    <div id="dot"></div>
    <span id="stTxt">Chargement...</span>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sb-tabs">
      <div id="tabNotes" class="sb-tab active" onclick="switchTab('notes')">Notes <span class="tab-count" id="countNotes">0</span></div>
      <div id="tabArch" class="sb-tab arch-tab" onclick="switchTab('archived')">Archives <span class="tab-count" id="countArch">0</span></div>
    </div>
    <div class="sb-top">
      <input type="text" id="search" placeholder="Rechercher..." oninput="renderList()">
      <button id="btnNew" onclick="createNewNote()">+</button>
    </div>
    <div id="tagFilter"></div>
    <div id="list"></div>
  </aside>

  <main id="editor" class="hide">
    <div class="toolbar">
      <input type="text" id="title" placeholder="Titre de la note">
      <button class="btn" id="btnSave" onclick="saveCurrentNote()">Enregistrer</button>
      <button class="btn" id="btnArch" onclick="toggleArchive()">Archiver</button>
    </div>
    <div class="tag-zone">
      <span style="color:var(--muted);font-size:0.8rem">Tags:</span>
      <input type="text" id="tagInput" placeholder="Séparez par des virgules">
    </div>
    <textarea id="body" placeholder="Contenu de la note..."></textarea>
    <div style="text-align:right">
      <button id="btnDel" onclick="deleteNote()">Supprimer</button>
    </div>
  </main>
</div>

<div id="overlay"><div class="spinner"></div></div>
<div id="toast"></div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, onValue, set, remove } from "firebase/database";

  const firebaseConfig = {
    apiKey: "AIzaSyBkDCy6sVzVAspfzwwiY7uHogPFy5wezQs",
    authDomain: "notes-2e0b8.firebaseapp.com",
    databaseURL: "https://notes-2e0b8-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "notes-2e0b8",
    storageBucket: "notes-2e0b8.firebasestorage.app",
    messagingSenderId: "922708939920",
    appId: "1:922708939920:web:932594a09e80161c3e7415"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let notes = [];
  let currentId = null;
  let currentTab = "notes";
  let selectedTag = null; // Stocke le tag de filtrage

  function init() {
    onValue(ref(db, 'notes'), (snapshot) => {
      const data = snapshot.val();
      notes = data ? Object.values(data) : [];
      renderTagFilter();
      renderList();
      updateCounts();
      document.getElementById("overlay").style.display = "none";
      setStatus("Prêt", "saved");
    });
  }

  window.switchTab = (tab) => {
    currentTab = tab;
    selectedTag = null; // Reset le filtre tag au changement d'onglet
    document.getElementById("tabNotes").classList.toggle("active", tab === "notes");
    document.getElementById("tabArch").classList.toggle("active", tab === "archived");
    renderTagFilter();
    renderList();
    if (currentId) hideEditor();
  };

  // ── Rendu du filtre par tags ──
  window.renderTagFilter = () => {
    const $tf = document.getElementById("tagFilter");
    $tf.innerHTML = "";
    
    // Extraire tous les tags uniques des notes de l'onglet courant
    const allTags = new Set();
    notes.filter(n => !!n.archived === (currentTab === "archived")).forEach(n => {
      if (n.tags) n.tags.split(',').forEach(t => {
        const clean = t.trim();
        if (clean) allTags.add(clean);
      });
    });

    if (allTags.size === 0) { $tf.style.display = "none"; return; }
    $tf.style.display = "flex";

    // Bouton "Tous"
    const btnAll = document.createElement("div");
    btnAll.className = "tf-tag" + (!selectedTag ? " active" : "");
    btnAll.textContent = "Tous";
    btnAll.onclick = () => { selectedTag = null; renderTagFilter(); renderList(); };
    $tf.appendChild(btnAll);

    // Liste des tags triés
    Array.from(allTags).sort().forEach(tag => {
      const el = document.createElement("div");
      el.className = "tf-tag" + (selectedTag === tag ? " active" : "");
      el.textContent = tag;
      el.onclick = () => {
        selectedTag = (selectedTag === tag) ? null : tag;
        renderTagFilter();
        renderList();
      };
      $tf.appendChild(el);
    });
  };

  window.renderList = () => {
    const $list = document.getElementById("list");
    $list.innerHTML = "";
    const query = document.getElementById("search").value.toLowerCase();
    
    const filtered = notes.filter(n => {
      const matchTab = !!n.archived === (currentTab === "archived");
      const matchSearch = (n.title + n.body + n.tags).toLowerCase().includes(query);
      const matchTag = !selectedTag || (n.tags && n.tags.split(',').map(t=>t.trim()).includes(selectedTag));
      return matchTab && matchSearch && matchTag;
    });

    filtered.sort((a,b) => b.id.localeCompare(a.id)).forEach(n => {
      const tagList = n.tags ? n.tags.split(',').map(t => t.trim()).filter(t => t !== "") : [];
      const el = document.createElement("div");
      el.className = "ni" + (n.id === currentId ? " active" : "");
      let tagsHtml = '<div class="ni-tags">';
      tagList.forEach(t => tagsHtml += `<span class="ni-tag">${t}</span>`);
      tagsHtml += '</div>';

      el.innerHTML = `
        <div class="ni-t">${n.title || "Sans titre"}</div>
        <div class="ni-d">${n.date || ""}</div>
        ${tagList.length > 0 ? tagsHtml : ''}
      `;
      el.onclick = () => openNote(n.id);
      $list.appendChild(el);
    });
  };

  window.openNote = (id) => {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    document.getElementById("title").value = note.title;
    document.getElementById("body").value = note.body;
    document.getElementById("tagInput").value = note.tags || "";
    document.getElementById("btnArch").textContent = note.archived ? "Désarchiver" : "Archiver";
    document.getElementById("editor").classList.remove("hide");
    renderList();
  };

  window.createNewNote = () => {
    currentId = "note_" + Date.now();
    document.getElementById("title").value = "";
    document.getElementById("body").value = "";
    document.getElementById("tagInput").value = selectedTag || ""; // Pré-remplir avec le tag sélectionné
    document.getElementById("editor").classList.remove("hide");
    document.getElementById("title").focus();
  };

  window.saveCurrentNote = async () => {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId) || {};
    const updatedNote = {
      id: currentId,
      title: document.getElementById("title").value,
      body: document.getElementById("body").value,
      tags: document.getElementById("tagInput").value,
      date: new Date().toLocaleString('fr-FR'),
      archived: note.archived || false
    };
    setStatus("Sauvegarde...", "saving");
    try {
      await set(ref(db, 'notes/' + currentId), updatedNote);
      setStatus("Enregistré", "saved");
      showToast("Sauvegardé ✓");
    } catch (e) { setStatus("Erreur", "error"); }
  };

  window.toggleArchive = async () => {
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.archived = !note.archived;
    await set(ref(db, 'notes/' + currentId), note);
    hideEditor();
    showToast(note.archived ? "Archivé" : "Restauré");
  };

  window.deleteNote = async () => {
    if (!confirm("Supprimer ?")) return;
    await remove(ref(db, 'notes/' + currentId));
    hideEditor();
    showToast("Supprimé");
  };

  function hideEditor() {
    document.getElementById("editor").classList.add("hide");
    currentId = null;
    renderList();
  }

  function updateCounts() {
    document.getElementById("countNotes").textContent = notes.filter(x => !x.archived).length;
    document.getElementById("countArch").textContent = notes.filter(x => x.archived).length;
  }

  function setStatus(txt, state) {
    document.getElementById("stTxt").textContent = txt;
    document.getElementById("dot").className = state;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  init();
</script>
</body>
</html>
