<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad v8</title>
<link rel="icon" type="image/png" href="iconmonstr-note-23-240.png">

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
    }
  }
</script>

<style>

  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f1f3f4;
    --panel:#ffffff;
    --card:#ffffff;
    --accent:#fbbc04;
    --accent2:#f9ab00;
    --text:#202124;
    --muted:#5f6368;
    --border:#dfe1e5;
    --danger:#d93025;
    --success:#188038;
    --arch:#f29900;
    --r:14px;
    --font:'Google Sans','Segoe UI',system-ui,sans-serif;
  }

  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  header{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    padding:12px 18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
    box-shadow:0 1px 2px rgba(60,64,67,.15);
  }
  header h1{font-size:1.25rem;font-weight:700;color:#5f6368}
  .version{font-size:0.72rem;background:#fff7df;padding:2px 8px;border-radius:12px;color:#8a6700;border:1px solid #fce8b2}

  #status{margin-left:auto;font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #dot.saving{background:#f29900} #dot.saved{background:var(--success)} #dot.error{background:var(--danger)}

  .app{display:flex;flex:1;overflow:hidden;gap:0}

  aside{
    flex:1;
    min-width:0;
    background:transparent;
    border-right:none;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding:14px;
  }

  .sb-tabs{display:flex;gap:8px;margin-bottom:10px}
  .sb-tab{padding:8px 14px;text-align:center;font-size:0.85rem;font-weight:600;cursor:pointer;color:var(--muted);border:1px solid var(--border);border-radius:999px;background:#fff;transition:0.2s}
  .sb-tab.active{color:#fff;background:#5f6368;border-color:#5f6368}
  .sb-tab.arch-tab.active{color:#fff;background:#8a6700;border-color:#8a6700}
  .tab-count{display:inline-block;background:rgba(255,255,255,0.28);border-radius:10px;padding:1px 6px;font-size:0.68rem;margin-left:4px}

  .sb-top{padding:4px 0 12px;display:flex;gap:8px}
  #search{flex:1;background:#fff;border:1px solid var(--border);border-radius:999px;color:var(--text);padding:10px 14px;font-size:0.9rem;outline:none}
  #btnNew{background:var(--accent);color:#3c4043;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:1.55rem;font-weight:500;line-height:1}

  #tagFilter{padding:2px 0 10px;display:flex;flex-wrap:wrap;gap:8px}
  .tf-tag{background:#fff;border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:0.75rem;cursor:pointer;color:var(--muted);transition:0.2s}
  .tf-tag.active{background:#e8f0fe;border-color:#c2dbff;color:#174ea6}

  #pinnedWrap{padding:4px 2px 8px}
  #pinnedWrap.hide{display:none}
  .section-title{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 8px 2px}
  #pinnedList{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;padding-bottom:6px}
  #list{flex:1;overflow-y:auto;padding:6px 2px 8px;column-width:250px;column-gap:14px}
  .ni{display:inline-block;width:100%;margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:0.18s;break-inside:avoid;box-shadow:0 1px 2px rgba(60,64,67,.2)}
  .ni:hover{box-shadow:0 4px 10px rgba(60,64,67,.2)}
  .ni.dragging{opacity:0.55;transform:scale(0.98)}
  .ni.drag-over{outline:2px dashed #1a73e8;outline-offset:-3px}
  /* couleurs par note — appliquées via style inline */

  .color-palette{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:4px 0}
  .color-palette label{font-size:0.8rem;color:var(--muted);flex-shrink:0}
  #colorSwatches{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .cp-swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
  .cp-swatch:hover{transform:scale(1.18)}
  .cp-swatch.selected{border-color:#202124;transform:scale(1.18)}
  .cp-swatch[data-color="default"]{background:#fff;border:2px solid var(--border)}
  .ni.active{outline:2px solid #1a73e8;outline-offset:-2px}
  .ni-t{font-weight:600;font-size:1.02rem;line-height:1.3;margin-bottom:2px;white-space:normal;overflow-wrap:anywhere}
  .ni-d{font-size:0.74rem;color:var(--muted);margin-top:4px;text-transform:capitalize}
  .ni-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
  .ni-tag{background:rgba(32,33,36,0.08);border:none;border-radius:999px;padding:2px 8px;font-size:0.68rem;color:#3c4043}
  #pinnedList .ni{display:block;margin:0;break-inside:auto}

  main{width:33%;max-width:33%;display:flex;flex-direction:column;overflow:hidden;padding:16px;gap:12px;background:#fff;border-right:1px solid var(--border);order:-1}
  main.hide{display:none}
  
  .toolbar{display:flex;flex-direction:column;gap:10px;}
  .toolbar-buttons{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .toolbar-buttons .btn{flex-shrink:0;white-space:nowrap}
  #title{width:100%;background:#fff;border:1px solid var(--border);border-radius:12px;color:var(--text);padding:10px 14px;font-size:1.1rem;font-weight:600;outline:none;}

  .btn{padding:9px 12px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:0.82rem;transition:0.2s}
  #btnSave{background:#1a73e8;color:#fff}
  #btnDupl{background:#e6f4ea;color:#188038;border:1px solid #cce9d2}
  #btnPin{background:#fff7df;color:#8a6700;border:1px solid #fce8b2}
  #btnArch{background:#fff;color:var(--text);border:1px solid var(--border)}
  #btnClose{background:none;color:var(--muted);border:1px solid var(--border);padding:9px 11px}
  #btnClose:hover{border-color:var(--danger);color:var(--danger)}

  .tag-zone{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:8px 12px;cursor:text}
  #tagChips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tag-chip{display:inline-flex;align-items:center;gap:4px;background:#e8f0fe;border:1px solid #c2dbff;border-radius:999px;padding:3px 10px;font-size:0.8rem;color:#174ea6}
  .tag-chip-del{background:none;border:none;color:#174ea6;cursor:pointer;font-size:1rem;line-height:1;padding:0 0 0 2px;opacity:0.6;display:flex;align-items:center}
  .tag-chip-del:hover{opacity:1}
  #tagInput{background:transparent;border:none;color:var(--text);padding:4px 2px;outline:none;font-size:0.9rem;width:100%}
  #tagDropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:12px;z-index:200;max-height:200px;overflow-y:auto;display:none;box-shadow:0 6px 18px rgba(60,64,67,0.2)}
  #tagDropdown.open{display:block}
  .tag-sugg{padding:9px 14px;font-size:0.85rem;cursor:pointer;color:var(--text)}
  .tag-sugg:hover,.tag-sugg.focused{background:#f8f9fa}
  .tag-sugg.new-tag{color:#174ea6}

  #body{flex:1;background:#fff;border:1px solid var(--border);border-radius:12px;color:var(--text);padding:16px;font-size:1rem;line-height:1.6;resize:none;outline:none;font-family:inherit}

  #toast{position:fixed;bottom:25px;right:25px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 24px;font-size:0.9rem;opacity:0;transition:0.3s;pointer-events:none;z-index:1000;box-shadow:0 4px 14px rgba(60,64,67,.2)}
  #toast.show{opacity:1;transform:translateY(-10px)}
  #overlay{position:fixed;inset:0;background:rgba(241,243,244,0.7);display:flex;align-items:center;justify-content:center;z-index:900}
  .spinner{width:35px;height:35px;border:4px solid #d2d6da;border-top-color:#1a73e8;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #loginScreen{position:fixed;inset:0;background:#f8f9fa;display:flex;align-items:center;justify-content:center;z-index:1000}
  #loginScreen.hidden{display:none}
  .login-box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:20px;box-shadow:0 6px 18px rgba(60,64,67,0.2)}
  .login-box h2{font-size:1.4rem;font-weight:700;color:#5f6368;text-align:center}
  .login-box p{font-size:0.85rem;color:var(--muted);text-align:center;margin-top:-10px}
  .login-field{display:flex;flex-direction:column;gap:6px}
  .login-field label{font-size:0.8rem;color:var(--muted);font-weight:600}
  .login-field input{background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-size:0.95rem;outline:none;transition:border-color 0.2s}
  .login-field input:focus{border-color:#1a73e8}
  #btnLogin{background:#1a73e8;color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s}
  #btnLogin:hover{background:#185abc}
  #loginError{color:var(--danger);font-size:0.82rem;text-align:center;min-height:18px}

  #userInfo{margin-left:12px;font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:8px}
  #btnSignOut{background:none;border:1px solid var(--border);border-radius:999px;color:var(--muted);padding:4px 10px;font-size:0.75rem;cursor:pointer;transition:0.2s}
  #btnSignOut:hover{border-color:var(--danger);color:var(--danger)}

  @media (max-width: 1024px){
    .app{flex-direction:column}
    aside{padding:10px 10px 2px}
    #list{column-width:210px}
    main{width:100%;max-width:none;height:46vh;border-right:none;border-top:1px solid var(--border);order:0}
  }

</style>
</head>
<body>

<header>
  <h1>Notepad</h1>
  <span class="version">v8</span>
  <div id="status"><div id="dot"></div><span id="stTxt">Connexion...</span></div>
  <div id="userInfo" style="display:none">
    <span id="userEmail"></span>
    <button id="btnSignOut" onclick="handleSignOut()">Déconnexion</button>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sb-tabs">
      <div id="tabNotes" class="sb-tab active" onclick="switchTab('notes')">Notes <span class="tab-count" id="countNotes">0</span></div>
      <div id="tabArch" class="sb-tab arch-tab" onclick="switchTab('archived')">Archives <span class="tab-count" id="countArch">0</span></div>
    </div>
    <div class="sb-top">
      <input type="text" id="search" placeholder="Recherche rapide..." oninput="renderList()">
      <button id="btnNew" onclick="createNewNote()">+</button>
    </div>
    <div id="tagFilter"></div>
    <div id="pinnedWrap" class="hide">
      <div class="section-title">Épinglées</div>
      <div id="pinnedList"></div>
    </div>
    <div id="list"></div>
  </aside>

  <main id="editor" class="hide">
    <div class="toolbar">
      <input type="text" id="title" placeholder="Titre de la note">
      <div class="toolbar-buttons">
        <button class="btn" id="btnSave" onclick="saveCurrentNote()">Enregistrer</button>
        <button class="btn" id="btnDupl" onclick="duplicateNote()">Dupliquer</button>
        <button class="btn" id="btnPin" onclick="togglePin()">Épingler</button>
        <button class="btn" id="btnArch" onclick="toggleArchive()">Action</button>
        <button class="btn" id="btnClose" onclick="hideEditor()" title="Fermer la note">✕</button>
      </div>
    </div>
    <div class="tag-zone" id="tagZone">
      <span style="color:var(--muted);font-size:0.85rem;flex-shrink:0">Étiquettes :</span>
      <div id="tagChips"></div>
      <div style="position:relative;flex:1;min-width:100px">
        <input type="text" id="tagInput" placeholder="Ajouter un tag..." autocomplete="off">
        <div id="tagDropdown"></div>
      </div>
    </div>
    <div class="color-palette">
      <label>Couleur :</label>
      <div id="colorSwatches"></div>
    </div>
    <textarea id="body" placeholder="Commencez à écrire..."></textarea>
    <div style="text-align:right; padding-top:10px">
      <button style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.8rem" onclick="deleteNote()">Supprimer définitivement</button>
    </div>
  </main>
</div>

<div id="loginScreen">
  <div class="login-box">
    <h2>Notepad</h2>
    <p>Connectez-vous pour acceder a vos notes</p>
    <div class="login-field">
      <label for="loginEmail">Adresse e-mail</label>
      <input type="email" id="loginEmail" placeholder="vous@exemple.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label for="loginPassword">Mot de passe</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="loginError"></div>
    <button id="btnLogin" onclick="handleLogin()">Se connecter</button>
  </div>
</div>

<div id="overlay"><div class="spinner"></div></div>
<div id="toast"></div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, onValue, set, update, remove } from "firebase/database";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";

  const firebaseConfig = {
    apiKey: "AIzaSyBkDCy6sVzVAspfzwwiY7uHogPFy5wezQs",
    authDomain: "notes-2e0b8.firebaseapp.com",
    databaseURL: "https://notes-2e0b8-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "notes-2e0b8",
    storageBucket: "notes-2e0b8.firebasestorage.app",
    messagingSenderId: "922708939920",
    appId: "1:922708939920:web:932594a09e80161c3e7415"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  let notes = [];
  let currentId = null;
  let currentTab = "notes";
  let selectedTag = "a-gmva-expo";
  let dbUnsubscribe = null;
  let currentTags = [];
  let tagSuggFocused = -1;
  let draggedNoteId = null;
  let justDropped = false;

  // Force le format "jeudi 5 mars" en français
  const getFrenchDate = () => {
    return new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  };

  // ── Auth handlers ──
  window.handleLogin = async () => {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl    = document.getElementById("loginError");
    errEl.textContent = "";
    if (!email || !password) { errEl.textContent = "Veuillez remplir tous les champs."; return; }
    try {
      document.getElementById("btnLogin").disabled = true;
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      const msgs = {
        "auth/invalid-credential":       "Email ou mot de passe incorrect.",
        "auth/user-not-found":           "Aucun compte avec cet email.",
        "auth/wrong-password":           "Mot de passe incorrect.",
        "auth/invalid-email":            "Adresse email invalide.",
        "auth/too-many-requests":        "Trop de tentatives. Réessayez plus tard.",
      };
      errEl.textContent = msgs[e.code] || "Erreur de connexion. Réessayez.";
    } finally {
      document.getElementById("btnLogin").disabled = false;
    }
  };

  window.handleSignOut = async () => {
    if (dbUnsubscribe) { dbUnsubscribe(); dbUnsubscribe = null; }
    await signOut(auth);
  };

  // Login on Enter key
  document.getElementById("loginPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") handleLogin();
  });
  document.getElementById("loginEmail").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginPassword").focus();
  });

  // ── Auth state observer ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User is signed in
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("userEmail").textContent = user.email;
      document.getElementById("userInfo").style.display = "flex";
      document.getElementById("loginEmail").value = "";
      document.getElementById("loginPassword").value = "";
      document.getElementById("loginError").textContent = "";
      init();
    } else {
      // User is signed out
      if (dbUnsubscribe) { dbUnsubscribe(); dbUnsubscribe = null; }
      notes = [];
      currentId = null;
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("userInfo").style.display = "none";
      document.getElementById("overlay").style.display = "none";
      document.getElementById("editor").classList.add("hide");
      renderList();
      updateCounts();
    }
  });

  // ── Tag autocomplete ──
  function getAllKnownTags() {
    const set = new Set();
    notes.forEach(n => {
      if (n.tags) n.tags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => set.add(t));
    });
    return Array.from(set).sort();
  }

  function renderTagChips() {
    const chips = document.getElementById("tagChips");
    chips.innerHTML = "";
    currentTags.forEach(tag => {
      const chip = document.createElement("span");
      chip.className = "tag-chip";
      const label = document.createTextNode(tag);
      const btn = document.createElement("button");
      btn.className = "tag-chip-del";
      btn.type = "button";
      btn.textContent = "×";
      btn.onclick = () => { currentTags = currentTags.filter(t => t !== tag); renderTagChips(); };
      chip.appendChild(label);
      chip.appendChild(btn);
      chips.appendChild(chip);
    });
  }

  function addTag(raw) {
    const tag = raw.trim();
    if (!tag || currentTags.includes(tag)) return;
    currentTags.push(tag);
    renderTagChips();
    document.getElementById("tagInput").value = "";
    closeTagDropdown();
  }

  function closeTagDropdown() {
    document.getElementById("tagDropdown").classList.remove("open");
    tagSuggFocused = -1;
  }

  function openTagDropdown(query) {
    const dropdown = document.getElementById("tagDropdown");
    const known = getAllKnownTags().filter(t =>
      !currentTags.includes(t) &&
      (query === "" || t.toLowerCase().includes(query.toLowerCase()))
    );
    const showNew = query.trim() && !known.map(t=>t.toLowerCase()).includes(query.trim().toLowerCase()) && !currentTags.map(t=>t.toLowerCase()).includes(query.trim().toLowerCase());

    dropdown.innerHTML = "";
    known.forEach(tag => {
      const el = document.createElement("div");
      el.className = "tag-sugg";
      el.textContent = tag;
      el.onmousedown = e => { e.preventDefault(); addTag(tag); };
      dropdown.appendChild(el);
    });
    if (showNew) {
      const el = document.createElement("div");
      el.className = "tag-sugg new-tag";
      el.textContent = `+ Créer "${query.trim()}"`;
      el.onmousedown = e => { e.preventDefault(); addTag(query.trim()); };
      dropdown.appendChild(el);
    }
    if (dropdown.children.length > 0) {
      dropdown.classList.add("open");
      tagSuggFocused = -1;
    } else {
      closeTagDropdown();
    }
  }

  document.getElementById("tagInput").addEventListener("input", e => {
    const val = e.target.value;
    if (val.endsWith(',')) { addTag(val.slice(0, -1)); }
    else { openTagDropdown(val); }
  });

  document.getElementById("tagInput").addEventListener("focus", e => {
    openTagDropdown(e.target.value);
  });

  document.getElementById("tagInput").addEventListener("blur", () => {
    setTimeout(closeTagDropdown, 150);
  });

  document.getElementById("tagInput").addEventListener("keydown", e => {
    const items = document.getElementById("tagDropdown").querySelectorAll(".tag-sugg");
    if (e.key === "Enter") {
      e.preventDefault();
      if (tagSuggFocused >= 0 && items[tagSuggFocused]) {
        items[tagSuggFocused].onmousedown(e);
      } else {
        addTag(document.getElementById("tagInput").value);
      }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      tagSuggFocused = Math.min(tagSuggFocused + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle("focused", i === tagSuggFocused));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      tagSuggFocused = Math.max(tagSuggFocused - 1, -1);
      items.forEach((el, i) => el.classList.toggle("focused", i === tagSuggFocused));
    } else if (e.key === "Escape") {
      closeTagDropdown();
    } else if (e.key === "Backspace" && !e.target.value && currentTags.length > 0) {
      currentTags.pop();
      renderTagChips();
    }
  });

  // Cliquer sur la zone de tags focus l'input
  document.getElementById("tagZone").addEventListener("click", e => {
    if (e.target === document.getElementById("tagZone") || e.target === document.getElementById("tagChips")) {
      document.getElementById("tagInput").focus();
    }
  });

  // ── Palette couleurs ──
  const NOTE_COLORS = [
    { key: "default", bg: "#ffffff", label: "Défaut" },
    { key: "green",   bg: "#e6f4ea", label: "Vert" },
    { key: "yellow",  bg: "#fef7e0", label: "Jaune" },
    { key: "red",     bg: "#fce8e6", label: "Rouge" },
    { key: "blue",    bg: "#e8f0fe", label: "Bleu" },
    { key: "teal",    bg: "#e0f5f5", label: "Turquoise" },
    { key: "purple",  bg: "#f3e8fd", label: "Violet" },
    { key: "peach",   bg: "#fde8d0", label: "Pêche" },
    { key: "gray",    bg: "#f1f3f4", label: "Gris" },
  ];
  let currentColor = "default";

  function getColorBg(key) {
    const c = NOTE_COLORS.find(c => c.key === key);
    return c ? c.bg : "#ffffff";
  }

  function renderColorSwatches() {
    const wrap = document.getElementById("colorSwatches");
    wrap.innerHTML = "";
    NOTE_COLORS.forEach(c => {
      const sw = document.createElement("div");
      sw.className = "cp-swatch" + (currentColor === c.key ? " selected" : "");
      sw.style.background = c.bg;
      sw.title = c.label;
      sw.dataset.color = c.key;
      sw.onclick = () => {
        currentColor = c.key;
        renderColorSwatches();
        document.getElementById("editor").style.background = getColorBg(c.key);
      };
      wrap.appendChild(sw);
    });
  }

  function init() {
    document.getElementById("overlay").style.display = "flex";
    dbUnsubscribe = onValue(ref(db, 'notes'), (snapshot) => {
      const data = snapshot.val();
      notes = data ? Object.values(data) : [];
      renderTagFilter();
      renderList();
      updateCounts();
      document.getElementById("overlay").style.display = "none";
      setStatus("Prêt", "saved");
    });
  }

  window.switchTab = (tab) => {
    currentTab = tab;
    selectedTag = (tab === "notes") ? "a-gmva-expo" : null;
    document.getElementById("tabNotes").classList.toggle("active", tab === "notes");
    document.getElementById("tabArch").classList.toggle("active", tab === "archived");
    renderTagFilter();
    renderList();
    if (currentId) hideEditor();
  };

  window.renderTagFilter = () => {
    const $tf = document.getElementById("tagFilter");
    $tf.innerHTML = "";
    const allTags = new Set();
    notes.filter(n => !!n.archived === (currentTab === "archived")).forEach(n => {
      if (n.tags) n.tags.split(',').forEach(t => {
        const clean = t.trim();
        if (clean) allTags.add(clean);
      });
    });

    if (allTags.size === 0) { $tf.style.display = "none"; return; }
    $tf.style.display = "flex";

    const btnAll = document.createElement("div");
    btnAll.className = "tf-tag" + (!selectedTag ? " active" : "");
    btnAll.textContent = "Tous";
    btnAll.onclick = () => { selectedTag = null; renderTagFilter(); renderList(); };
    $tf.appendChild(btnAll);

    Array.from(allTags).sort().forEach(tag => {
      const el = document.createElement("div");
      el.className = "tf-tag" + (selectedTag === tag ? " active" : "");
      el.textContent = tag;
      el.onclick = () => {
        selectedTag = (selectedTag === tag) ? null : tag;
        renderTagFilter();
        renderList();
      };
      $tf.appendChild(el);
    });
  };

  function getFilteredNotes(query) {
    return notes.filter(n => {
      const matchTab = !!n.archived === (currentTab === "archived");
      const matchSearch = (n.title + n.body + n.tags).toLowerCase().includes(query);
      const matchTag = !selectedTag || (n.tags && n.tags.split(',').map(t=>t.trim()).includes(selectedTag));
      return matchTab && matchSearch && matchTag;
    });
  }

  function sortNotesForDisplay(list) {
    return list.sort((a, b) => {
      const aOrder = Number.isFinite(a.order) ? a.order : null;
      const bOrder = Number.isFinite(b.order) ? b.order : null;
      if (aOrder !== null && bOrder !== null) return aOrder - bOrder;
      if (aOrder !== null) return -1;
      if (bOrder !== null) return 1;
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    });
  }

  async function reorderNotes(dragId, targetId, pinnedState) {
    if (!dragId || !targetId || dragId === targetId) return;

    const ordered = sortNotesForDisplay(
      notes.filter(n =>
        !!n.archived === (currentTab === "archived") &&
        !!n.pinned === pinnedState
      )
    );
    const fromIndex = ordered.findIndex(n => n.id === dragId);
    const toIndex = ordered.findIndex(n => n.id === targetId);
    if (fromIndex < 0 || toIndex < 0) return;

    const [moved] = ordered.splice(fromIndex, 1);
    ordered.splice(toIndex, 0, moved);

    const updates = {};
    ordered.forEach((n, idx) => {
      const nextOrder = idx + 1;
      n.order = nextOrder;
      updates[`notes/${n.id}/order`] = nextOrder;
    });

    setStatus("Réorganisation...", "saving");
    try {
      await update(ref(db), updates);
      setStatus("Prêt", "saved");
      showToast("Ordre des notes mis à jour ✓");
    } catch (e) {
      setStatus("Erreur", "error");
      showToast("Impossible de réorganiser les notes");
    }
  }

  function bindCardDnD(el, note) {
    el.addEventListener("dragstart", (e) => {
      draggedNoteId = note.id;
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", note.id);
      el.classList.add("dragging");
    });

    el.addEventListener("dragend", () => {
      el.classList.remove("dragging");
      document.querySelectorAll(".ni.drag-over").forEach(x => x.classList.remove("drag-over"));
    });

    el.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (draggedNoteId && draggedNoteId !== note.id) {
        e.dataTransfer.dropEffect = "move";
        el.classList.add("drag-over");
      }
    });

    el.addEventListener("dragleave", () => {
      el.classList.remove("drag-over");
    });

    el.addEventListener("drop", async (e) => {
      e.preventDefault();
      el.classList.remove("drag-over");
      const sourceId = e.dataTransfer.getData("text/plain") || draggedNoteId;
      if (!sourceId || sourceId === note.id) return;

      const source = notes.find(n => n.id === sourceId);
      if (!source || !!source.pinned !== !!note.pinned) return;

      justDropped = true;
      await reorderNotes(sourceId, note.id, !!note.pinned);
      draggedNoteId = null;
      setTimeout(() => { justDropped = false; }, 50);
    });
  }

  function createNoteCard(note) {
    const tagList = note.tags ? note.tags.split(',').map(t => t.trim()).filter(t => t !== "") : [];
    const el = document.createElement("div");
    el.className = "ni" + (note.id === currentId ? " active" : "");
    el.draggable = true;
    el.dataset.noteId = note.id;

    let tagsHtml = '<div class="ni-tags">';
    tagList.forEach(t => tagsHtml += `<span class="ni-tag">${t}</span>`);
    tagsHtml += '</div>';

    el.innerHTML = `
      <div class="ni-t">${note.pinned ? "📌 " : ""}${note.title || "Note sans titre"}</div>
      <div class="ni-d">${note.date || ""}</div>
      ${tagList.length > 0 ? tagsHtml : ''}
    `;
    // Appliquer la couleur stockée
    const bg = getColorBg(note.color || "default");
    el.style.background = bg;

    bindCardDnD(el, note);

    el.onclick = () => {
      if (justDropped) return;
      openNote(note.id);
    };

    return el;
  }

  window.renderList = () => {
    const $list = document.getElementById("list");
    const $pinnedWrap = document.getElementById("pinnedWrap");
    const $pinnedList = document.getElementById("pinnedList");
    $list.innerHTML = "";
    $pinnedList.innerHTML = "";

    const query = document.getElementById("search").value.toLowerCase();
    const filtered = sortNotesForDisplay(getFilteredNotes(query));

    const pinnedNotes = filtered.filter(n => !!n.pinned);
    const regularNotes = filtered.filter(n => !n.pinned);

    if (pinnedNotes.length > 0) {
      $pinnedWrap.classList.remove("hide");
      pinnedNotes.forEach(n => $pinnedList.appendChild(createNoteCard(n)));
    } else {
      $pinnedWrap.classList.add("hide");
    }

    regularNotes.forEach(n => $list.appendChild(createNoteCard(n)));
  };

  window.openNote = async (id) => {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    
    // Mettre à jour la date de consultation sans changer l'ordre manuel
    await update(ref(db, 'notes/' + id), { updatedAt: Date.now() });

    document.getElementById("title").value = note.title;
    document.getElementById("body").value = note.body;
    currentTags = note.tags ? note.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    currentColor = note.color || "default";
    renderTagChips();
    renderColorSwatches();
    document.getElementById("editor").style.background = getColorBg(currentColor);
    document.getElementById("tagInput").value = "";
    document.getElementById("btnArch").textContent = note.archived ? "Restaurer" : "Archiver";
    document.getElementById("btnPin").textContent = note.pinned ? "Désépingler" : "Épingler";
    document.getElementById("editor").classList.remove("hide");
    renderList();
  };

  window.duplicateNote = async () => {
    if (!currentId) return;
    const original = notes.find(n => n.id === currentId);
    const newId = "note_" + Date.now();
    const copy = {
      ...original,
      id: newId,
      title: original.title + " (Copie)",
      date: getFrenchDate(),
      updatedAt: Date.now(),
      order: Number.isFinite(original.order) ? original.order + 0.1 : null,
      pinned: !!original.pinned
    };
    await set(ref(db, 'notes/' + newId), copy);
    openNote(newId);
    showToast("Note dupliquée ✓");
  };

  window.createNewNote = () => {
    currentId = "note_" + Date.now();
    document.getElementById("title").value = "";
    document.getElementById("body").value = "";
    currentTags = (selectedTag && selectedTag !== "Tous") ? [selectedTag] : [];
    currentColor = "default";
    renderTagChips();
    renderColorSwatches();
    document.getElementById("editor").style.background = getColorBg("default");
    document.getElementById("tagInput").value = "";
    document.getElementById("btnArch").textContent = "Archiver";
    document.getElementById("btnPin").textContent = "Épingler";
    document.getElementById("editor").classList.remove("hide");
    document.getElementById("title").focus();
  };

  window.saveCurrentNote = async () => {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId) || {};
    const updatedNote = {
      id: currentId,
      title: document.getElementById("title").value,
      body: document.getElementById("body").value,
      tags: currentTags.join(', '),
      color: currentColor,
      date: getFrenchDate(),
      updatedAt: Date.now(),
      archived: note.archived || false,
      order: Number.isFinite(note.order) ? note.order : null,
      pinned: note.pinned || false
    };
    setStatus("Sauvegarde...", "saving");
    try {
      await set(ref(db, 'notes/' + currentId), updatedNote);
      setStatus("Prêt", "saved");
      showToast("Enregistré ✓");
    } catch (e) { setStatus("Erreur", "error"); }
  };

  window.togglePin = async () => {
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.pinned = !note.pinned;
    note.updatedAt = Date.now();
    note.order = Number.isFinite(note.order) ? note.order : null;
    await set(ref(db, 'notes/' + currentId), note);
    document.getElementById("btnPin").textContent = note.pinned ? "Désépingler" : "Épingler";
    showToast(note.pinned ? "Note épinglée" : "Note désépinglée");
  };

  window.toggleArchive = async () => {
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.archived = !note.archived;
    note.updatedAt = Date.now();
    note.order = Number.isFinite(note.order) ? note.order : null;
    await set(ref(db, 'notes/' + currentId), note);
    hideEditor();
    showToast(note.archived ? "Note archivée" : "Note restaurée");
  };

  window.deleteNote = async () => {
    if (!confirm("Supprimer cette note ?")) return;
    await remove(ref(db, 'notes/' + currentId));
    hideEditor();
    showToast("Supprimé");
  };

  window.hideEditor = function hideEditor() {
    document.getElementById("editor").classList.add("hide");
    document.getElementById("editor").style.background = "";
    currentId = null;
    renderList();
  }

  function updateCounts() {
    document.getElementById("countNotes").textContent = notes.filter(x => !x.archived).length;
    document.getElementById("countArch").textContent = notes.filter(x => x.archived).length;
  }

  function setStatus(txt, state) {
    document.getElementById("stTxt").textContent = txt;
    document.getElementById("dot").className = state;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  // init() is called by onAuthStateChanged when the user logs in
</script>
</body>
</html>
